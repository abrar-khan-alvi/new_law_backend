name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: law_enforcement_db
          POSTGRES_USER: le_user
          POSTGRES_PASSWORD: devpassword123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U le_user -d law_enforcement_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: core.settings.development
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "False"
      USE_SQLITE: "False"
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: law_enforcement_db
      DB_USER: le_user
      DB_PASSWORD: devpassword123
      # Keeps the whole suite hermetic — no real LLM/Ollama/Bedrock call ever
      # fires from a test, matching what every test in this repo already assumes.
      AI_MODE: mock

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        # Mirrors the Dockerfile so `pip install` behaves the same as the
        # image every developer actually runs against.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpq-dev libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: python manage.py test
