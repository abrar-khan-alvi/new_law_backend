services:

  db:
    image: pgvector/pgvector:pg16
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    restart: always
    environment:
      # This box has 2 vCPUs — never let Ollama try to serve more than one
      # generation at a time or keep more than one model resident in RAM.
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    volumes:
      - ollama_data:/root/.ollama
    # libggml-cpu-sapphirerapids.so (the AMX backend) segfaults on this instance's
    # CPU — remove it on every start so Ollama falls back to a non-AMX CPU variant.
    entrypoint: ["sh", "-c"]
    command:
      - "rm -f /usr/lib/ollama/libggml-cpu-sapphirerapids.so; exec /bin/ollama serve"

  ollama-pull-model:
    image: ollama/ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: /bin/sh
    # Only llama3.2 is ever used (see LOCAL_MODEL_NAME in .env) — llama3.1:8b was
    # being pulled needlessly, wasting ~4.7GB disk and risking a silent fallback to
    # a model this CPU-only box can't run at usable speed if LOCAL_MODEL_NAME is
    # ever unset (its Django default is llama3.1:8b).
    command: -c "until ollama list >/dev/null 2>&1; do echo 'Waiting for Ollama to start...'; sleep 2; done && ollama pull llama3.2"
    depends_on:
      - ollama

  backend:
    build: .
    command: >
      sh -c "until python -c 'import socket; socket.create_connection((\"db\", 5432), timeout=2)' 2>/dev/null; do
               echo 'waiting for postgres...'; sleep 1; done &&
             python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.production
      USE_SQLITE: "False"
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      LOCAL_MODEL_URL: http://ollama:11434
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      ollama-pull-model:
        condition: service_completed_successfully
    restart: unless-stopped

  celery:
    build: .
    # --concurrency=1: this box has 2 vCPUs shared with gunicorn, Postgres, and
    # Ollama itself — running 2+ narrative generations at once (the prefork
    # default) would have them all fight for the same cores and slow every
    # request down together instead of queuing cleanly.
    command: celery -A core worker --loglevel=info --concurrency=1
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.production
      USE_SQLITE: "False"
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      LOCAL_MODEL_URL: http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      ollama-pull-model:
        condition: service_completed_successfully
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.production
      USE_SQLITE: "False"
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
