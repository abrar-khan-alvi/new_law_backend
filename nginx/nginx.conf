server {
    listen 80;
    server_name api.aiforlawenforcement.tech;

    client_max_body_size 500M;

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Preserve Cloudflare's original scheme header instead of overwriting it
        # with $scheme (always "http" here, since Cloudflare's Flexible SSL mode
        # talks plain HTTP to the origin). Overwriting it makes Django think
        # every request is insecure, and SECURE_SSL_REDIRECT sends it into a
        # redirect loop against a client that already connected over HTTPS.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
