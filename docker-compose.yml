services:

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: law_enforcement_db
      POSTGRES_USER: le_user
      POSTGRES_PASSWORD: devpassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U le_user -d law_enforcement_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull-model:
    image: ollama/ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: /bin/sh
    command: -c "until ollama list >/dev/null 2>&1; do echo 'Waiting for Ollama to start...'; sleep 2; done && ollama pull llama3.1:8b"
    depends_on:
      - ollama

  backend:
    build: .
    command: >
      sh -c "until python -c 'import socket; socket.create_connection((\"db\", 5432), timeout=2)' 2>/dev/null; do
               echo 'waiting for postgres...'; sleep 1; done &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.development
      # Override .env so the container talks to the compose services:
      USE_SQLITE: "False"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: law_enforcement_db
      DB_USER: le_user
      DB_PASSWORD: devpassword123
      REDIS_URL: redis://redis:6379/0
      # AI_MODE stays in .env (default 'mock').
      LOCAL_MODEL_URL: http://ollama:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build: .
    command: celery -A core worker --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.development
      USE_SQLITE: "False"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: law_enforcement_db
      DB_USER: le_user
      DB_PASSWORD: devpassword123
      REDIS_URL: redis://redis:6379/0
      LOCAL_MODEL_URL: http://ollama:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery-beat:
    build: .
    command: celery -A core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.development
      USE_SQLITE: "False"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: law_enforcement_db
      DB_USER: le_user
      DB_PASSWORD: devpassword123
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  ollama_data:
